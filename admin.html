<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Production — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #e8e2d9;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 48px 32px;
      border: 1px solid rgba(232,226,217,0.08);
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8a96e;
      margin-bottom: 40px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a8480;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: #161616;
      border: 1px solid rgba(232,226,217,0.08);
      color: #e8e2d9;
      padding: 12px 16px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 24px;
      font-family: inherit;
    }
    input:focus { border-color: rgba(200,169,110,0.4); }

    /* LOGIN */
    #login-screen button {
      width: 100%;
      background: #c8a96e;
      color: #080808;
      border: none;
      padding: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
    }
    #login-screen button:hover { background: #d4b87a; }
    .error { color: #e05c5c; font-size: 0.78rem; margin-top: -16px; margin-bottom: 16px; display: none; }

    /* ADMIN */
    #admin-screen { display: none; text-align: center; }
    .status-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a8480;
      margin-bottom: 20px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 40px;
      padding: 12px 24px;
      border: 1px solid rgba(232,226,217,0.1);
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot.available { background: #3abcb1; box-shadow: 0 0 8px #3abcb1; animation: pulse 2s infinite; }
    .dot.unavailable { background: #e05c5c; box-shadow: 0 0 8px #e05c5c; }
    .status-text.available { color: #3abcb1; }
    .status-text.unavailable { color: #e05c5c; }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .toggle-btn {
      width: 100%;
      border: 1px solid;
      padding: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      background: none;
      margin-bottom: 16px;
      transition: all 0.3s;
    }
    .toggle-btn.to-unavailable { border-color: #e05c5c; color: #e05c5c; }
    .toggle-btn.to-unavailable:hover { background: #e05c5c; color: #080808; }
    .toggle-btn.to-available { border-color: #3abcb1; color: #3abcb1; }
    .toggle-btn.to-available:hover { background: #3abcb1; color: #080808; }

    .token-section { margin-top: 32px; border-top: 1px solid rgba(232,226,217,0.08); padding-top: 24px; }
    .token-section label { text-align: left; }
    .token-section input { margin-bottom: 12px; font-size: 0.8rem; }
    .save-token {
      width: 100%;
      background: none;
      border: 1px solid rgba(200,169,110,0.4);
      color: #c8a96e;
      padding: 10px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    .save-token:hover { background: rgba(200,169,110,0.1); }

    .msg {
      font-size: 0.78rem;
      margin-top: 12px;
      height: 20px;
      color: #3abcb1;
    }
    .msg.error { color: #e05c5c; }
    .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(232,226,217,0.2); border-top-color: #c8a96e; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 12px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Bannière ── */
    .section-title {
      font-size: 0.65rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #8a8480;
      margin: 40px 0 20px;
      padding-top: 32px;
      border-top: 1px solid rgba(232,226,217,0.08);
    }
    .banner-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .banner-toggle label {
      margin: 0;
      font-size: 0.72rem;
      color: #e8e2d9;
      letter-spacing: 0.1em;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid rgba(232,226,217,0.08);
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #8a8480;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: rgba(200,169,110,0.2); border-color: rgba(200,169,110,0.4); }
    .switch input:checked + .slider::before { transform: translateX(20px); background: #c8a96e; }
    textarea {
      width: 100%;
      background: #161616;
      border: 1px solid rgba(232,226,217,0.08);
      color: #e8e2d9;
      padding: 12px 16px;
      font-size: 0.88rem;
      outline: none;
      margin-bottom: 8px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }
    textarea:focus { border-color: rgba(200,169,110,0.4); }
    .char-count {
      font-size: 0.68rem;
      color: #8a8480;
      text-align: right;
      margin-bottom: 20px;
    }
    .save-btn {
      width: 100%;
      background: none;
      border: 1px solid #c8a96e;
      color: #c8a96e;
      padding: 12px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
    }
    .save-btn:hover { background: rgba(200,169,110,0.1); }
    .msg-banner { font-size: 0.78rem; margin-top: 10px; height: 18px; color: #3abcb1; }
    .msg-banner.error { color: #e05c5c; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="login-screen">
  <div class="logo">Focus_Production</div>
  <label for="pwd">Mot de passe</label>
  <input type="password" id="pwd" placeholder="••••••" onkeydown="if(event.key==='Enter') login()">
  <p class="error" id="pwd-error">Mot de passe incorrect.</p>
  <button onclick="login()">Accéder</button>
</div>

<!-- ADMIN -->
<div class="container" id="admin-screen">
  <div class="logo">Focus_Production</div>
  <div class="status-label">Statut actuel</div>
  <div class="status-badge">
    <span class="dot" id="dot"></span>
    <span class="status-text" id="status-text"></span>
  </div>
  <button class="toggle-btn" id="toggle-btn" onclick="toggleStatus()"></button>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg"></div>


  <div class="section-title">Bannière d'annonce</div>

  <div class="banner-toggle">
    <label for="banner-active">Afficher la bannière</label>
    <label class="switch">
      <input type="checkbox" id="banner-active">
      <span class="slider"></span>
    </label>
  </div>

  <label for="banner-text">Message</label>
  <textarea id="banner-text" maxlength="120" placeholder="Nouveau projet en ligne · Tournage la semaine prochaine · Complet jusqu'au 15 mai…" oninput="updateCharCount()"></textarea>
  <div class="char-count"><span id="char-count">0</span>/120</div>

  <button class="save-btn" onclick="saveBanner()">Enregistrer la bannière</button>
  <div class="msg-banner" id="msg-banner"></div>

  <div class="token-section">
    <label for="gh-token">Token GitHub (sauvegardé localement)</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="save-token" onclick="saveToken()">Sauvegarder le token</button>
  </div>
</div>

<script>
  const OWNER  = 'OlivierShapiro';
  const REPO   = 'focus-production-website';
  const FILE   = 'status.json';
  const PWD    = '5251';

  // ── Login ──
  function login() {
    const val = document.getElementById('pwd').value;
    if (val === PWD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadStatus();
    } else {
      document.getElementById('pwd-error').style.display = 'block';
    }
  }

  // ── Token ──
  function getToken() { return localStorage.getItem('fp_gh_token') || ''; }
  function saveToken() {
    const t = document.getElementById('gh-token').value.trim();
    if (!t) return;
    localStorage.setItem('fp_gh_token', t);
    document.getElementById('msg').textContent = '✓ Token sauvegardé.';
    document.getElementById('msg').className = 'msg';
    setTimeout(() => document.getElementById('msg').textContent = '', 2000);
  }

  // ── Load current status from GitHub ──
  let currentStatus = true;
  let currentSha    = '';

  async function loadStatus() {
    const token = getToken();
    if (token) document.getElementById('gh-token').value = token;
    try {
      const res  = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
        headers: token ? { Authorization: 'token ' + token } : {}
      });
      const data = await res.json();
      currentSha    = data.sha;
      const decoded = JSON.parse(atob(data.content));
      currentStatus = decoded.available;
      updateUI(currentStatus);
      loadBanner(decoded);
    } catch(e) {
      document.getElementById('msg').textContent = 'Impossible de lire le statut.';
      document.getElementById('msg').className = 'msg error';
    }
  }

  function updateUI(available) {
    const dot  = document.getElementById('dot');
    const text = document.getElementById('status-text');
    const btn  = document.getElementById('toggle-btn');
    if (available) {
      dot.className  = 'dot available';
      text.className = 'status-text available';
      text.textContent = 'Disponible';
      btn.className  = 'toggle-btn to-unavailable';
      btn.textContent = 'Passer en Indisponible';
    } else {
      dot.className  = 'dot unavailable';
      text.className = 'status-text unavailable';
      text.textContent = 'Indisponible';
      btn.className  = 'toggle-btn to-available';
      btn.textContent = 'Passer en Disponible';
    }
  }


  // ── Bannière ──
  function updateCharCount() {
    var txt = document.getElementById('banner-text').value;
    document.getElementById('char-count').textContent = txt.length;
  }

  async function loadBanner(data) {
    var banner = data.banner || { active: false, text: '' };
    document.getElementById('banner-active').checked = banner.active;
    document.getElementById('banner-text').value     = banner.text || '';
    updateCharCount();
  }

  async function saveBanner() {
    var token = getToken();
    if (!token) {
      showBannerMsg('Entre et sauvegarde ton token GitHub d\'abord.', true);
      return;
    }
    var newContent = JSON.stringify({
      available: currentStatus,
      banner: {
        active: document.getElementById('banner-active').checked,
        text:   document.getElementById('banner-text').value.trim()
      }
    }, null, 2);
    var encoded = btoa(unescape(encodeURIComponent(newContent)));

    try {
      var res = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + FILE, {
        method: 'PUT',
        headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Bannière mise à jour', content: encoded, sha: currentSha })
      });
      if (res.ok) {
        var d = await res.json();
        currentSha = d.content.sha;
        showBannerMsg('✓ Bannière enregistrée. Redéploiement en cours…');
      } else {
        showBannerMsg('Erreur lors de l\'enregistrement.', true);
      }
    } catch(e) {
      showBannerMsg('Erreur réseau.', true);
    }
  }

  function showBannerMsg(txt, isError) {
    var el = document.getElementById('msg-banner');
    el.textContent = txt;
    el.className   = 'msg-banner' + (isError ? ' error' : '');
    setTimeout(function() { el.textContent = ''; }, 3000);
  }

  // ── Toggle ──
  async function toggleStatus() {
    const token = getToken();
    if (!token) {
      document.getElementById('msg').textContent = 'Entre et sauvegarde ton token GitHub d\'abord.';
      document.getElementById('msg').className = 'msg error';
      return;
    }
    const newStatus = !currentStatus;
    const newContent = JSON.stringify({ available: newStatus }, null, 2);
    const encoded    = btoa(unescape(encodeURIComponent(newContent)));

    document.getElementById('spinner').style.display = 'block';
    document.getElementById('toggle-btn').disabled   = true;
    document.getElementById('msg').textContent = '';

    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
        method: 'PUT',
        headers: {
          Authorization: 'token ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: newStatus ? 'Statut : Disponible' : 'Statut : Indisponible',
          content: encoded,
          sha: currentSha
        })
      });

      if (res.ok) {
        const data = await res.json();
        currentSha    = data.content.sha;
        currentStatus = newStatus;
        updateUI(currentStatus);
        document.getElementById('msg').textContent = '✓ Statut mis à jour. Vercel redéploie dans ~30s.';
        document.getElementById('msg').className   = 'msg';
      } else {
        const err = await res.json();
        document.getElementById('msg').textContent = 'Erreur : ' + (err.message || 'inconnue');
        document.getElementById('msg').className   = 'msg error';
      }
    } catch(e) {
      document.getElementById('msg').textContent = 'Erreur réseau.';
      document.getElementById('msg').className   = 'msg error';
    }

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('toggle-btn').disabled   = false;
  }
</script>
</body>
</html>
